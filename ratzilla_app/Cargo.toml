[package]
name = "rasm"
version = "0.1.0"
authors = ["0x01d <0x@01d.gg>"]
license = "MIT"
edition = "2021"

[dependencies]
ratatui = { version = "0.29.0", default-features = false, features = ["unstable-widget-ref"] }
color-eyre = "0.6.3"
ratzilla = "0.1"
tachyonfx = { version = "0.16.0", default-features = false, features = ["web-time"] }
web-time = "1.0"
web-sys = { version = "0.3.77",features = [
    "Window",
    "Navigator",
    "Clipboard",
    "Geolocation",
    "Permissions",
    "RtcPeerConnection",
    "console",
    "BatteryManager",
    "MediaDevices",
    "Request",
    "RequestInit",
    "RequestMode",
    "Response",
    "History",
    "EventListener",
    "Event",
    "PopStateEvent"
]} 
js-sys = "0.3.77"
wasm-bindgen = "0.2.100"
console_error_panic_hook = "0.1.7"
wasm-bindgen-futures = "0.4.50"
gloo = "0.11.0"
gloo-net = "0.6.0"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
flume = "0.11.1"
syntect = { version = "5.2.0", default-features = false, features = [
    "default-fancy",
] }
pulldown-cmark = "0.13"
chrono = { version = "0.4", features = ["serde"] }
